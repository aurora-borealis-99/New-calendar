<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        #bg-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: #fdf6e3; background-size: cover; background-position: center; z-index: -1; transition: 0.5s; }
        body { margin: 0; padding: 20px 8px; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: "PingFang SC", "Microsoft YaHei", sans-serif; box-sizing: border-box; }
        .calendar-box { background: white; width: calc(100vw - 16px); max-width: 1000px; padding: 12px 8px; border-radius: 12px; box-shadow: 0 5px 20px rgba(0,0,0,0.05); position: relative; box-sizing: border-box; overflow: hidden; display: flex; flex-direction: column; }
        
        /* 【修改处 1】不透明度调低到 0.4，让背景更清透 */
        .has-bg .calendar-box { background: rgba(255, 255, 255, 0.4); backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px); }
        
        .has-bg .cell, .has-bg .empty-cell { background: rgba(255, 255, 255, 0.2) !important; border-color: rgba(238, 238, 238, 0.4) !important; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; padding: 0 15px; }
        .title { font-size: 16px; color: #4a5568; font-weight: bold; cursor: pointer; border-bottom: 1px dashed #cbd5e0; }
        .btn { cursor: pointer; border: none; background: #f0f2f5; width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .week-header { display: grid; grid-template-columns: repeat(7, 1fr); text-align: center; color: #a0aec0; font-size: 10px; margin-bottom: 5px; }
        .date-grid { display: grid; grid-template-columns: repeat(7, 1fr); grid-auto-rows: 90px; border: 1px solid #eee; width: 100%; }
        .cell, .empty-cell { background: white; padding: 2px; border-right: 1px solid #eee; border-bottom: 1px solid #eee; box-sizing: border-box; }
        .cell { cursor: pointer; position: relative; }
        .date-row { display: flex; align-items: baseline; gap: 3px; height: 18px; pointer-events: none; }
        .s { font-size: 14px; color: #2d3748; font-weight: bold; }
        .l { font-size: 9px; color: #a0aec0; transform: scale(0.85); transform-origin: left; }
        #event-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; display: grid; grid-template-columns: repeat(7, 1fr); grid-auto-rows: 90px; }
        .event-bar { position: relative; font-size: 11px; padding: 4px; border-radius: 4px; margin: 22px 2px 0 2px; z-index: 10; pointer-events: auto; cursor: pointer; display: flex !important; flex-direction: column; overflow: hidden; box-sizing: border-box; line-height: 1.2; }
        #yearView { display: none; padding: 5px; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 100%; box-sizing: border-box; }
        .year-month-card { border: 1px solid #eee; border-radius: 8px; padding: 8px; cursor: pointer; background: white; }
        .ym-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px; margin-top: 4px; }
        .ym-day { font-size: 8px; text-align: center; height: 12px; color: #718096; position: relative; }
        .dot-mark { width: 2px; height: 2px; background: #4fd1c5; border-radius: 50%; position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); }
        #modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.3); z-index: 999; display: none; }
        #editor-modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 12px; border-radius: 12px; z-index: 1000; width: 92%; max-width: 420px; box-sizing: border-box; }
        .tool-group { display: flex; align-items: center; gap: 3px; margin-bottom: 8px; flex-wrap: nowrap; overflow-x: auto; }
        .tool-btn { background: #f8fafc; border: 1px solid #e2e8f0; min-width: 28px; height: 26px; border-radius: 4px; cursor: pointer; font-size: 11px; display: flex; align-items: center; justify-content: center; }
        .dot { width: 14px; height: 14px; border-radius: 50%; border: 1px solid rgba(0,0,0,0.05); cursor: pointer; }
        #editor-field { width: 100%; min-height: 120px; max-height: 300px; border: 1px solid #e2e8f0; border-radius: 8px; padding: 10px; margin: 8px 0; outline: none; overflow-y: auto; display: flex; flex-direction: column; background: #fff; box-sizing: border-box; }
        .selected { background-color: #ebf8ff !important; border: 1px solid #4299e1 !important; }
        .data-btn { font-size: 10px; color: #94a3b8; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 4px; padding: 2px 4px; cursor: pointer; margin-right: 2px; }
    </style>
</head>
<body id="body-tag">
    <div id="bg-layer"></div>
    <div id="modal-overlay" onclick="closeModal()"></div>
    <div id="editor-modal">
        <div style="font-size: 12px; color: #64748b; margin-bottom: 8px; background: #f1f5f9; padding: 6px; border-radius: 6px;">
            范围: <select id="startDaySelect"></select> — <select id="endDaySelect"></select> 日
        </div>
        <div class="tool-group">
            <button class="tool-btn" onmousedown="exec(event,'bold')">B</button>
            <button class="tool-btn" onmousedown="exec(event,'italic')">I</button>
            <button class="tool-btn" onmousedown="exec(event,'underline')">U</button>
            <div style="width:1px;height:14px;background:#ddd"></div>
            <div class="dot" style="background:#000" onmousedown="setStyle(event,'color','#000')"></div>
            <div class="dot" style="background:#e53e3e" onmousedown="setStyle(event,'color','#e53e3e')"></div>
            <div class="dot" style="background:#3182ce" onmousedown="setStyle(event,'color','#3182ce')"></div>
            <div class="dot" style="background:#38a169" onmousedown="setStyle(event,'color','#38a169')"></div>
            <div class="dot" style="background:#805ad5" onmousedown="setStyle(event,'color','#805ad5')"></div>
            <div class="dot" style="background:#ed8936" onmousedown="setStyle(event,'color','#ed8936')"></div>
            <div class="dot" style="background:#fff;border:1px solid #ddd" onmousedown="setStyle(event,'color','#fff')"></div>
        </div>
        <div class="tool-group">
            <button class="tool-btn" onmousedown="setStyle(event,'fontSize','14px')">小</button>
            <button class="tool-btn" onmousedown="setStyle(event,'fontSize','18px')">中</button>
            <button class="tool-btn" onmousedown="setStyle(event,'fontSize','26px')">大</button>
            <button class="tool-btn" onmousedown="setStyle(event,'fontSize','42px')">巨</button>
            <div style="width:1px;height:14px;background:#ddd"></div>
            <button class="tool-btn" onmousedown="exec(event,'justifyLeft')">←</button>
            <button class="tool-btn" onmousedown="exec(event,'justifyCenter')">↔</button>
            <button class="tool-btn" onmousedown="exec(event,'justifyRight')">→</button>
            <div style="width:1px;height:14px;background:#ddd"></div>
            <button class="tool-btn" onmousedown="setAlign(event,'flex-start')">↑</button>
            <button class="tool-btn" onmousedown="setAlign(event,'center')">↕</button>
            <button class="tool-btn" onmousedown="setAlign(event,'flex-end')">↓</button>
        </div>
        <div class="tool-group">
            <span style="font-size:10px;color:#999">底色:</span>
            <div class="dot" style="background:#FFD1DC" onclick="setBarColor('#FFD1DC')"></div>
            <div class="dot" style="background:#B2F2BB" onclick="setBarColor('#B2F2BB')"></div>
            <div class="dot" style="background:#A5D8FF" onclick="setBarColor('#A5D8FF')"></div>
            <div class="dot" style="background:#FFF3BF" onclick="setBarColor('#FFF3BF')"></div>
            <div class="dot" style="background:#E5DBFF" onclick="setBarColor('#E5DBFF')"></div>
            <div class="dot" style="background:#f1f5f9;border:1px solid #ddd" onclick="setBarColor('#f1f5f9')"></div>
        </div>
        <div id="editor-field" contenteditable="true"></div>
        <div style="display:flex; justify-content: space-between; align-items: center; border-top:1px solid #eee; padding-top:10px;">
            <div>
                <button id="delBtn" style="color:#e53e3e;background:none;border:none;font-size:10px;cursor:pointer" onclick="deleteEvent()">删除</button>
                <button class="data-btn" onclick="exportData()">备份</button>
                <button class="data-btn" onclick="importData()">还原</button>
                <button class="data-btn" onclick="changeBg()">背景</button>
            </div>
            <button style="background:#4fd1c5;color:white;border:none;padding:8px 24px;border-radius:6px;cursor:pointer;font-weight:bold" onclick="saveEvent()">保存</button>
        </div>
        <div style="display:flex; align-items:center; gap:8px; font-size:10px; color:#94a3b8; margin-top:8px; border-top:1px dashed #eee; padding-top:8px;">
            <span>清晰</span>
            <input type="range" id="blurRange" min="0" max="25" value="4" oninput="updateBlur(this.value)" style="flex:1">
            <span>模糊</span>
        </div>
    </div>

    <div class="calendar-box" id="mainBox">
        <div class="header">
            <button class="btn" onclick="changeMonth(-1)">‹</button>
            <div id="monthDisplay" class="title" onclick="toggleView()"></div>
            <button class="btn" onclick="changeMonth(1)">›</button>
        </div>
        <div id="monthView">
            <div class="week-header"><div>日</div><div>一</div><div>二</div><div>三</div><div>四</div><div>五</div><div>六</div></div>
            <div style="position:relative">
                <div id="dateGrid" class="date-grid"></div>
                <div id="event-layer"></div>
            </div>
        </div>
        <div id="yearView"></div>
        <div id="adminTrigger" style="text-align:center;font-size:10px;color:#a0aec0;margin-top:15px;cursor:pointer">© 2026 🤿宇宙级潜水员🐟</div>
    </div>

    <script>
        const S_URL = "https://cnbarxcyhtuyympqwspb.supabase.co";
        const S_KEY = "sb_publishable_8lKRoBeyMpq8UEYugqvn7g_3_iImIur";
        const _db = supabase.createClient(S_URL, S_KEY);

        let currentDate = new Date(), viewMode = 'month', selection = [], currentBarColor = '#B2F2BB', editingId = null, events = [];
        let isAdmin = localStorage.getItem('is_admin') === 'true';

        async function syncData() {
            const { data } = await _db.from('events').select('*');
            events = data || [];
            await updateDisplayBg();
            if(viewMode === 'year') renderYear(); else renderCalendar();
        }

        function getLunar(y, m, d) {
            const dateObj = new Date(y, m, d);
            const lunar = new Intl.DateTimeFormat('zh-u-ca-chinese', {day:'numeric'}).format(dateObj);
            if (lunar === '1日') return new Intl.DateTimeFormat('zh-u-ca-chinese', {month:'long'}).format(dateObj);
            const num = parseInt(lunar), units = ["", "一", "二", "三", "四", "五", "六", "七", "八", "九", "十"];
            if (num <= 10) return "初" + units[num];
            if (num < 20) return "十" + units[num % 10];
            if (num === 20) return "二十";
            if (num < 30) return "廿" + units[num % 10];
            return "三十";
        }

        function renderCalendar() {
            const grid = document.getElementById('dateGrid'), layer = document.getElementById('event-layer');
            grid.innerHTML = ''; layer.innerHTML = '';
            const y = currentDate.getFullYear(), m = currentDate.getMonth();
            document.getElementById('monthDisplay').innerText = `${y}年 ${m+1}月`;
            const first = new Date(y, m, 1).getDay(), dInM = new Date(y, m + 1, 0).getDate();
            for (let i = 0; i < first; i++) grid.innerHTML += '<div class="empty-cell"></div>';
            let dateMap = {};
            for (let d = 1; d <= dInM; d++) {
                grid.innerHTML += `<div class="cell" onclick="handleCellClick(${d})" id="cell-${d}"><div class="date-row"><span class="s">${d}</span><span class="l">${getLunar(y,m,d)}</span></div></div>`;
                dateMap[d] = { row: Math.floor((first+d-1)/7)+1, col: ((first+d-1)%7)+1 };
            }
            for (let i = 0; i < (7-((first+dInM)%7))%7; i++) grid.innerHTML += '<div class="empty-cell"></div>';
            events.filter(ev => ev.year === y && ev.month === m).forEach(ev => {
                if(!dateMap[ev.start] || !dateMap[ev.end]) return;
                for(let r=dateMap[ev.start].row; r<=dateMap[ev.end].row; r++){
                    const sC = (r===dateMap[ev.start].row)?dateMap[ev.start].col : 1;
                    const eC = (r===dateMap[ev.end].row)?dateMap[ev.end].col : 7;
                    const bar = document.createElement('div'); bar.className='event-bar';
                    bar.style.gridColumn=`${sC}/${eC+1}`; bar.style.gridRow=r;
                    bar.style.backgroundColor=ev.barColor; 
                    bar.style.textAlign=ev.textAlign || 'left';
                    bar.style.justifyContent=ev.alignItems || 'flex-start';
                    if(r===dateMap[ev.start].row) bar.innerHTML = ev.text;
                    bar.onclick=(e)=>{e.stopPropagation(); openEditModal(ev.id)};
                    layer.appendChild(bar);
                }
            });
        }

        async function saveEvent() {
            const f = document.getElementById('editor-field');
            const sVal = parseInt(document.getElementById('startDaySelect').value);
            const eVal = parseInt(document.getElementById('endDaySelect').value);
            const data = {
                text: f.innerHTML, start: Math.min(sVal, eVal), end: Math.max(sVal, eVal),
                year: currentDate.getFullYear(), month: currentDate.getMonth(),
                barColor: currentBarColor, textAlign: f.style.textAlign || 'left', alignItems: f.style.alignItems || 'flex-start'
            };
            if(editingId) await _db.from('events').update(data).eq('id', editingId);
            else await _db.from('events').insert([{ id: Math.floor(Date.now()/1000), ...data }]);
            closeModal(); syncData();
        }

        function openEditModal(id, s, e) {
            if (!isAdmin) return;
            editingId = id; const f = document.getElementById('editor-field');
            const sS = document.getElementById('startDaySelect'), eS = document.getElementById('endDaySelect');
            sS.innerHTML = eS.innerHTML = ''; for(let i=1;i<=31;i++){ sS.innerHTML+=`<option value="${i}">${i}</option>`; eS.innerHTML+=`<option value="${i}">${i}</option>`; }
            if(id) {
                const ev = events.find(i => i.id == id);
                f.innerHTML = ev.text; sS.value = ev.start; eS.value = ev.end; currentBarColor = ev.barColor;
                f.style.textAlign = ev.textAlign; f.style.alignItems = ev.alignItems;
                document.getElementById('delBtn').style.display = 'block';
            } else {
                f.innerHTML = ''; sS.value = s; eS.value = e; currentBarColor = '#B2F2BB';
                f.style.textAlign = 'left'; f.style.alignItems = 'flex-start';
                document.getElementById('delBtn').style.display = 'none';
            }
            document.getElementById('modal-overlay').style.display = 'block';
            document.getElementById('editor-modal').style.display = 'block';
        }

        function setStyle(e, p, v) { e.preventDefault(); const sel = window.getSelection(); if (!sel.rangeCount || sel.toString().length === 0) return; const range = sel.getRangeAt(0); const span = document.createElement('span'); span.style[p] = v; span.style.lineHeight = "1.2"; try { span.appendChild(range.extractContents()); range.insertNode(span); sel.removeAllRanges(); } catch (err) {} }
        function exec(e, c) { e.preventDefault(); document.execCommand(c, false, null); }
        function setAlign(e,v){ e.preventDefault(); document.getElementById('editor-field').style.alignItems=v; }
        function setBarColor(c) { currentBarColor = c; }
        function updateBlur(v){ const box = document.getElementById('mainBox'); box.style.backdropFilter = `blur(${v}px)`; box.style.webkitBackdropFilter = `blur(${v}px)`; localStorage.setItem('my_calendar_blur', v); }

        function changeBg(){ 
            if(!isAdmin) return alert("请先解锁权限");
            const i=document.createElement("input"); i.type="file"; 
            i.onchange=e=>{ 
                const r=new FileReader(); 
                r.onload=ev=>{ 
                    const img = new Image(); img.src = ev.target.result;
                    img.onload = async () => { 
                        const canvas = document.createElement('canvas'); const ctx = canvas.getContext('2d');
                        /* 【修改处 2】清晰度提升到 2000 像素 */
                        const maxW = 2000; 
                        const scale = maxW / img.width;
                        canvas.width = maxW; canvas.height = img.height * scale;
                        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                        const compressed = canvas.toDataURL('image/jpeg', 0.7); 
                        
                        const bgId = `bg_${currentDate.getFullYear()}_${currentDate.getMonth()}`;
                        localStorage.setItem(bgId, compressed); 
                        await _db.from('configs').upsert([{ id: bgId, value: compressed }]);
                        updateDisplayBg(); 
                    }; 
                }; r.readAsDataURL(e.target.files[0]); 
            }; i.click(); 
        }

        async function updateDisplayBg() { 
            const bgId = `bg_${currentDate.getFullYear()}_${currentDate.getMonth()}`;
            let s = localStorage.getItem(bgId);
            if(!s) {
                const { data } = await _db.from('configs').select('value').eq('id', bgId).single();
                if(data && data.value) { s = data.value; localStorage.setItem(bgId, s); }
            }
            if(s){ 
                document.getElementById('bg-layer').style.backgroundImage=`url(${s})`; 
                document.getElementById('body-tag').classList.add('has-bg'); 
                updateBlur(localStorage.getItem('my_calendar_blur') || 4); 
            } else { 
                document.getElementById('bg-layer').style.backgroundImage='none'; 
                document.getElementById('body-tag').classList.remove('has-bg'); 
            } 
        }

        function exportData(){ const b=new Blob([JSON.stringify(events)],{type:'application/json'}); const a=document.createElement('a'); a.href=URL.createObjectURL(b); a.download='calendar_backup.json'; a.click(); }
        function importData(){ const i=document.createElement('input'); i.type='file'; i.onchange=e=>{ const r=new FileReader(); r.onload=async ev=>{ const newData=JSON.parse(ev.target.result); for(let d of newData){ await _db.from('events').upsert(d); } syncData(); }; r.readAsText(e.target.files[0]); }; i.click(); }
        function toggleView() { viewMode=(viewMode==='month'?'year':'month'); document.getElementById('monthView').style.display=(viewMode==='month'?'block':'none'); document.getElementById('yearView').style.display=(viewMode==='year'?'grid':'none'); syncData(); }
        function renderYear() { const yv=document.getElementById('yearView'); yv.innerHTML=''; const y=currentDate.getFullYear(); document.getElementById('monthDisplay').innerText=`${y}年 全览`; for(let m=0; m<12; m++) { const card=document.createElement('div'); card.className='year-month-card'; card.onclick=()=>{currentDate.setMonth(m); toggleView();}; let h=`<div style="font-size:11px;font-weight:bold">${m+1}月</div><div class="ym-grid">`; const first=new Date(y,m,1).getDay(), dInM=new Date(y,m+1,0).getDate(); for(let i=0; i<first; i++) h+='<div class="ym-day"></div>'; for(let d=1; d<=dInM; d++) { const has=events.some(ev=>ev.year===y && ev.month===m && d>=ev.start && d<=ev.end); h+=`<div class="ym-day">${d}${has?'<div class="dot-mark"></div>':''}</div>`; } card.innerHTML=h+'</div>'; yv.appendChild(card); } }
        function handleCellClick(d) { if(!isAdmin) return; if (selection.length === 0) { selection.push(d); document.getElementById(`cell-${d}`).classList.add('selected'); } else { openEditModal(null, Math.min(selection[0], d), Math.max(selection[0], d)); } }
        function closeModal() { document.getElementById('modal-overlay').style.display='none'; document.getElementById('editor-modal').style.display='none'; selection=[]; document.querySelectorAll('.cell').forEach(c=>c.classList.remove('selected')); }
        async function deleteEvent() { if(confirm("删除？")) { await _db.from('events').delete().eq('id', editingId); closeModal(); syncData(); } }
        function changeMonth(o) { currentDate.setMonth(currentDate.getMonth()+o); syncData(); }
        let uc=0; document.getElementById('adminTrigger').onclick=()=>{ if(++uc>=5){ if(prompt("验证码")==="2026"){ isAdmin=true; localStorage.setItem('is_admin','true'); alert("解锁成功"); } uc=0; } };
        syncData();
    </script>
</body>
</html>
