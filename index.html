<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>我的云端日历</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg: #fff5f5; --primary: #feb2b2; --text: #4a5568; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; color: var(--text); }
        #calendar-container { width: 95%; max-width: 400px; background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); border-radius: 30px; padding: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.05); }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .header h3 { margin: 0; cursor: pointer; user-select: none; }
        .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; position: relative; }
        .cell { aspect-ratio: 1; border: 1px solid #f7fafc; border-radius: 10px; display: flex; flex-direction: column; padding: 4px; font-size: 12px; cursor: pointer; position: relative; z-index: 2; }
        .empty-cell { aspect-ratio: 1; border: 1px solid #fdfdfd; background: rgba(0,0,0,0.01); border-radius: 10px; }
        .event-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: grid; grid-template-columns: repeat(7, 1fr); pointer-events: none; z-index: 3; }
        .event-bar { pointer-events: auto; height: 18px; margin-top: 22px; font-size: 10px; background: #fee2e2; padding: 0 6px; border-radius: 4px; display: flex; align-items: center; cursor: pointer; }
        .footer { text-align: center; font-size: 10px; color: #cbd5e0; margin-top: 20px; }
        #login-modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); z-index: 100; text-align: center; }
        input { border: 1px solid #eee; padding: 8px; border-radius: 8px; margin-bottom: 10px; outline: none; }
        button { border: none; background: var(--primary); color: white; padding: 8px 15px; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>

<div id="calendar-container">
    <div class="header">
        <button onclick="changeMonth(-1)">←</button>
        <h3 id="monthDisplay" onclick="handleTitleClick()">2026年4月</h3>
        <button onclick="changeMonth(1)">→</button>
    </div>
    <div style="position: relative;">
        <div class="grid" id="dateGrid"></div>
        <div class="event-layer" id="eventLayer"></div>
    </div>
    <div class="footer" id="statusLine">☁️ 云端同步模式 (访客)</div>
</div>

<div id="login-modal" id="loginModal">
    <h4 style="margin-top:0">管理员登录</h4>
    <input type="password" id="passInput" placeholder="输入访问暗号"><br>
    <button onclick="checkPass()">进入编辑模式</button>
</div>

<script>
    const S_URL = "https://cnbarxcyhtuyympqwspb.supabase.co";
    const S_KEY = "Sb_publishable_8lKRoBeyMpq8UEYugqvn7g_3_iImIur";
    const _db = supabase.createClient(S_URL, S_KEY);

    let curr = new Date();
    let events = [];
    let isAdmin = false;
    let clickHeaderTimes = 0;

    // 1. 加载云端数据
    async function loadData() {
        const { data, error } = await _db.from('events').select('*');
        if (!error) {
            events = data.map(e => ({
                id: e.id,
                date: e.event_date,
                text: e.content,
                color: e.color
            }));
            render();
        }
    }

    // 2. 渲染日历
    function render() {
        const grid = document.getElementById('dateGrid');
        const layer = document.getElementById('eventLayer');
        grid.innerHTML = ''; layer.innerHTML = '';
        
        const y = curr.getFullYear(), m = curr.getMonth();
        document.getElementById('monthDisplay').innerText = `${y}年${m+1}月`;
        
        const firstDay = new Date(y, m, 1).getDay();
        const daysInMonth = new Date(y, m + 1, 0).getDate();
        
        // 补全月初空格
        for (let i = 0; i < firstDay; i++) grid.innerHTML += '<div class="empty-cell"></div>';
        
        // 当月日期
        for (let d = 1; d <= daysInMonth; d++) {
            grid.innerHTML += `<div class="cell" onclick="addEvent(${d})">${d}</div>`;
            // 渲染该日的事件
            const dateStr = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
            const dayEvents = events.filter(e => e.date === dateStr);
            dayEvents.forEach(e => {
                const bar = document.createElement('div');
                bar.className = 'event-bar';
                bar.style.gridColumn = (firstDay + d - 1) % 7 + 1;
                bar.style.gridRow = Math.floor((firstDay + d - 1) / 7) + 1;
                bar.innerText = e.text;
                bar.onclick = (ev) => { ev.stopPropagation(); deleteEvent(e.id); };
                layer.appendChild(bar);
            });
        }

        // 补全月末空格（解决你发现的问题）
        const total = firstDay + daysInMonth;
        const remain = (7 - (total % 7)) % 7;
        for (let i = 0; i < remain; i++) grid.innerHTML += '<div class="empty-cell"></div>';
    }

    // 3. 交互功能
    async function addEvent(d) {
        if (!isAdmin) return;
        const txt = prompt("输入记录内容:");
        if (!txt) return;
        const dateStr = `${curr.getFullYear()}-${String(curr.getMonth()+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        await _db.from('events').insert([{ event_date: dateStr, content: txt, color: '#fee2e2' }]);
        loadData();
    }

    async function deleteEvent(id) {
        if (!isAdmin || !confirm("确定删除吗？")) return;
        await _db.from('events').delete().eq('id', id);
        loadData();
    }

    // 4. 登录暗号逻辑
    function handleTitleClick() {
        clickHeaderTimes++;
        if (clickHeaderTimes >= 5) {
            document.getElementById('login-modal').style.display = 'block';
            clickHeaderTimes = 0;
        }
    }

    function checkPass() {
        // 这里我预设暗号为 2026，你可以自行在下面代码修改
        if (document.getElementById('passInput').value === "2026") {
            isAdmin = true;
            document.getElementById('statusLine').innerText = "✨ 管理员模式";
            document.getElementById('login-modal').style.display = 'none';
            alert("验证成功！现在可以点击日期添加记录，点击记录条删除。");
        } else {
            alert("暗号错误");
        }
    }

    function changeMonth(s) {
        curr.setMonth(curr.getMonth() + s);
        render();
    }

    window.onload = loadData;
</script>
</body>
</html>
