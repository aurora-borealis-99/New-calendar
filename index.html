<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>我的云端日历</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/lunar-javascript/lunar.js"></script>
    
    <style>
        :root { --bg: #fff5f5; --primary: #feb2b2; --text: #4a5568; }
        body { 
            font-family: -apple-system, "PingFang SC", sans-serif; 
            background: var(--bg);
            background-image: url('https://images.unsplash.com/photo-1519750783826-e2420f4d687f?auto=format&fit=crop&w=1000&q=80');
            background-size: cover; background-attachment: fixed;
            margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; 
        }
        #calendar-container { 
            width: 92%; max-width: 400px; background: rgba(255,255,255,0.9); 
            backdrop-filter: blur(10px); border-radius: 25px; padding: 20px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.1); 
        }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .header h3 { margin: 0; color: var(--text); cursor: pointer; letter-spacing: 1px; }
        .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; position: relative; }
        .cell { 
            aspect-ratio: 1; border-radius: 10px; border: 1px solid #f7fafc; 
            display: flex; flex-direction: column; padding: 5px; font-size: 14px; 
            background: white; cursor: pointer; transition: 0.2s;
        }
        .cell:hover { background: #fffaf0; }
        .empty-cell { aspect-ratio: 1; background: transparent; }
        .lunar-num { font-size: 9px; color: #a0aec0; margin-top: 2px; }
        .event-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: grid; grid-template-columns: repeat(7, 1fr); pointer-events: none; z-index: 5; }
        .event-bar { 
            pointer-events: auto; height: 18px; margin-top: 24px; font-size: 10px; 
            background: var(--primary); color: white; padding: 0 6px; border-radius: 5px; 
            display: flex; align-items: center; overflow: hidden; white-space: nowrap;
        }
        #status-line { text-align: center; font-size: 10px; color: #cbd5e0; margin-top: 20px; }
        button { border: none; background: var(--primary); color: white; padding: 6px 12px; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>

<div id="calendar-container">
    <div class="header">
        <button onclick="changeMonth(-1)">←</button>
        <h3 id="monthTitle" onclick="handleLogin()">正在加载...</h3>
        <button onclick="changeMonth(1)">→</button>
    </div>
    <div style="position: relative;">
        <div class="grid" id="dateGrid"></div>
        <div class="event-layer" id="eventLayer"></div>
    </div>
    <div id="status-line">☁️ 正在同步云端...</div>
</div>

<script>
    // 你的专属配置（已填好）
    const S_URL = "https://cnbarxcyhtuyympqwspb.supabase.co";
    const S_KEY = "sb_publishable_8lKRoBeyMpq8UEYugqvn7g_3_iImIur";
    const _db = supabase.createClient(S_URL, S_KEY);

    let curr = new Date();
    let events = [];
    let isAdmin = false;
    let clickCount = 0;

    // 1. 获取数据
    async function loadData() {
        try {
            const { data, error } = await _db.from('events').select('*');
            if (error) throw error;
            events = data || [];
            document.getElementById('status-line').innerText = isAdmin ? "✨ 管理员模式" : "☁️ 访客模式 (只读)";
            render();
        } catch (e) {
            document.getElementById('status-line').innerText = "❌ 请检查 Supabase 表名和字段: " + e.message;
            render();
        }
    }

    // 2. 渲染画面
    function render() {
        const grid = document.getElementById('dateGrid');
        const layer = document.getElementById('eventLayer');
        grid.innerHTML = ''; layer.innerHTML = '';
        
        const y = curr.getFullYear(), m = curr.getMonth();
        document.getElementById('monthTitle').innerText = `${y}年${m+1}月`;
        
        const firstDay = new Date(y, m, 1).getDay();
        const daysInMonth = new Date(y, m + 1, 0).getDate();
        
        // 补月初
        for (let i = 0; i < firstDay; i++) grid.innerHTML += '<div class="empty-cell"></div>';
        
        // 日期格子
        for (let d = 1; d <= daysInMonth; d++) {
            const lunar = Solar.fromDate(new Date(y, m, d)).getLunar().getDayInChinese();
            grid.innerHTML += `<div class="cell" onclick="addNote(${d})"><span>${d}</span><span class="lunar-num">${lunar}</span></div>`;
            
            const dateStr = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
            events.filter(e => e.event_date === dateStr).forEach(e => {
                const bar = document.createElement('div');
                bar.className = 'event-bar';
                const pos = firstDay + d - 1;
                bar.style.gridColumn = (pos % 7) + 1;
                bar.style.gridRow = Math.floor(pos / 7) + 1;
                bar.innerText = e.content;
                bar.onclick = (ev) => { ev.stopPropagation(); deleteNote(e.id); };
                layer.appendChild(bar);
            });
        }
        
        // 补月末（解决你之前发现的问题）
        const total = firstDay + daysInMonth;
        const remain = (7 - (total % 7)) % 7;
        for (let i = 0; i < remain; i++) grid.innerHTML += '<div class="empty-cell"></div>';
    }

    // 3. 登录逻辑
    function handleLogin() {
        if (++clickCount >= 5) {
            if (prompt("请输入管理员暗号：") === "2026") {
                isAdmin = true;
                alert("已解锁编辑权限！");
                loadData();
            }
            clickCount = 0;
        }
    }

    // 4. 云端交互
    async function addNote(d) {
        if (!isAdmin) return alert("请连点标题5次验证身份后再记录");
        const txt = prompt("📝 今天的记录：");
        if (!txt) return;
        const dateStr = `${curr.getFullYear()}-${String(curr.getMonth()+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        await _db.from('events').insert([{ event_date: dateStr, content: txt, color: 'pink' }]);
        loadData();
    }

    async function deleteNote(id) {
        if (!isAdmin || !confirm("确定要删除这条记录吗？")) return;
        await _db.from('events').delete().eq('id', id);
        loadData();
    }

    function changeMonth(n) { curr.setMonth(curr.getMonth() + n); loadData(); }

    window.onload = loadData;
</script>
</body>
</html>
