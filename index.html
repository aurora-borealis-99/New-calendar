<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>云端同步日历</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/lunar-javascript/lunar.js"></script>
    
    <style>
        /* 恢复你之前最喜欢的“长代码”样式，确保视觉正确 */
        :root { --bg: #fff5f5; --primary: #feb2b2; --text: #4a5568; }
        body { 
            font-family: -apple-system, sans-serif; 
            background: var(--bg);
            background-image: url('https://images.unsplash.com/photo-1519750783826-e2420f4d687f?auto=format&fit=crop&w=1000&q=80');
            background-size: cover;
            background-attachment: fixed;
            margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; 
        }
        
        #calendar-container { 
            width: 90%; max-width: 400px; 
            background: rgba(255,255,255,0.9); 
            backdrop-filter: blur(10px); 
            border-radius: 25px; padding: 20px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            min-height: 450px; /* 强制容器有高度 */
        }

        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .header h3 { margin: 0; color: var(--text); cursor: pointer; }
        
        .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; position: relative; }
        
        /* 核心：确保格子可见 */
        .cell { 
            aspect-ratio: 1; border-radius: 10px; background: white;
            border: 1px solid #f0f0f0; display: flex; flex-direction: column;
            padding: 5px; font-size: 14px; cursor: pointer; position: relative;
        }
        .empty-cell { aspect-ratio: 1; background: transparent; }
        
        .lunar-text { font-size: 9px; color: #a0aec0; margin-top: 2px; }

        .event-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: grid; grid-template-columns: repeat(7, 1fr); pointer-events: none; z-index: 10; }
        .event-bar { 
            pointer-events: auto; height: 18px; margin-top: 24px; font-size: 10px; 
            background: var(--primary); color: white; padding: 0 4px; border-radius: 5px; 
            display: flex; align-items: center; overflow: hidden; justify-content: center;
        }

        #login-modal { 
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            background: white; padding: 25px; border-radius: 20px; z-index: 100; text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3); width: 200px;
        }
        input { width: 80%; padding: 8px; margin-bottom: 10px; border: 1px solid #eee; border-radius: 5px; }
        button { background: var(--primary); color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

<div id="calendar-container">
    <div class="header">
        <button onclick="changeMonth(-1)">←</button>
        <h3 id="monthDisplay" onclick="handleTitleClick()">日历加载中...</h3>
        <button onclick="changeMonth(1)">→</button>
    </div>
    <div style="position: relative;">
        <div class="grid" id="dateGrid"></div>
        <div class="event-layer" id="eventLayer"></div>
    </div>
    <div id="statusLine" style="text-align:center; font-size:10px; color:#a0aec0; margin-top:20px;">☁️ 初始化中...</div>
</div>

<div id="login-modal">
    <h4 style="margin:0 0 10px 0">身份验证</h4>
    <input type="password" id="passInput" placeholder="输入暗号">
    <button onclick="checkPass()">确定</button>
</div>

<script>
    // 你的专属配置
    const S_URL = "https://cnbarxcyhtuyympqwspb.supabase.co";
    const S_KEY = "Sb_publishable_8lKRoBeyMpq8UEYugqvn7g_3_iImIur";
    
    let _db;
    let curr = new Date();
    let events = [];
    let isAdmin = false;
    let clickHeaderTimes = 0;

    // 强制立即开始初始化
    async function start() {
        const status = document.getElementById('statusLine');
        try {
            // 初始化数据库连接
            if (typeof supabase !== 'undefined') {
                _db = supabase.createClient(S_URL, S_KEY);
                status.innerText = "☁️ 正在读取云端数据...";
                const { data, error } = await _db.from('events').select('*');
                if (!error) {
                    events = data.map(e => ({ id: e.id, date: e.event_date, text: e.content }));
                }
            } else {
                status.innerText = "⚠️ 插件未加载，仅本地预览";
            }
        } catch (e) {
            console.log(e);
            status.innerText = "⚠️ 云端连接异常";
        }
        render(); // 无论云端成不成功，都强制画出日历
    }

    function render() {
        const grid = document.getElementById('dateGrid');
        const layer = document.getElementById('eventLayer');
        const status = document.getElementById('statusLine');
        
        grid.innerHTML = ''; layer.innerHTML = '';
        
        const y = curr.getFullYear(), m = curr.getMonth();
        document.getElementById('monthDisplay').innerText = `${y}年${m+1}月`;
        
        const firstDay = new Date(y, m, 1).getDay();
        const daysInMonth = new Date(y, m + 1, 0).getDate();
        
        // 1. 补月初空格
        for (let i = 0; i < firstDay; i++) grid.innerHTML += '<div class="empty-cell"></div>';
        
        // 2. 画日期格子
        for (let d = 1; d <= daysInMonth; d++) {
            let lunarTxt = "";
            // 保护：如果农历插件没加载，也不要报错
            if (typeof Solar !== 'undefined') {
                try {
                    lunarTxt = Solar.fromDate(new Date(y, m, d)).getLunar().getDayInChinese();
                } catch(e) {}
            }

            grid.innerHTML += `
                <div class="cell" onclick="addEvent(${d})">
                    <span>${d}</span>
                    <span class="lunar-text">${lunarTxt}</span>
                </div>`;
            
            // 画云端记录
            const dateStr = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
            const dayEvents = events.filter(e => e.date === dateStr);
            dayEvents.forEach(e => {
                const bar = document.createElement('div');
                bar.className = 'event-bar';
                const pos = firstDay + d - 1;
                bar.style.gridColumn = (pos % 7) + 1;
                bar.style.gridRow = Math.floor(pos / 7) + 1;
                bar.innerText = e.text;
                bar.onclick = (ev) => { ev.stopPropagation(); deleteEvent(e.id); };
                layer.appendChild(bar);
            });
        }
        
        // 3. 补月末空格（解决缺一块的问题）
        const total = firstDay + daysInMonth;
        const remain = (7 - (total % 7)) % 7;
        for (let i = 0; i < remain; i++) grid.innerHTML += '<div class="empty-cell"></div>';

        if (status.innerText.includes("初始化")) {
            status.innerText = isAdmin ? "✨ 管理员模式" : "☁️ 访客模式 (只读)";
        }
    }

    // --- 按钮逻辑 ---
    function handleTitleClick() {
        if (++clickHeaderTimes >= 5) {
            document.getElementById('login-modal').style.display = 'block';
            clickHeaderTimes =
