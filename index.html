<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        #bg-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: #fdf6e3; background-size: cover; background-position: center; z-index: -1; transition: 0.5s; }
        body { margin: 0; padding: 20px 8px; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: "PingFang SC", sans-serif; box-sizing: border-box; }
        
        .calendar-box { background: rgba(255, 255, 255, 0.6); backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px); width: calc(100vw - 16px); max-width: 1000px; padding: 12px 8px; border-radius: 12px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); position: relative; box-sizing: border-box; display: flex; flex-direction: column; }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; padding: 0 15px; }
        .title { font-size: 16px; color: #2d3748; font-weight: bold; cursor: pointer; border-bottom: 1px dashed #4a5568; }
        .btn { cursor: pointer; border: none; background: rgba(0,0,0,0.05); width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        
        .week-header { display: grid; grid-template-columns: repeat(7, 1fr); text-align: center; color: #4a5568; font-size: 10px; margin-bottom: 5px; }
        .date-grid { display: grid; grid-template-columns: repeat(7, 1fr); grid-auto-rows: 90px; border: 1px solid rgba(0,0,0,0.05); width: 100%; }
        .cell { cursor: pointer; position: relative; padding: 2px; border-right: 1px solid rgba(0,0,0,0.05); border-bottom: 1px solid rgba(0,0,0,0.05); box-sizing: border-box; }
        .empty-cell { border-right: 1px solid rgba(0,0,0,0.05); border-bottom: 1px solid rgba(0,0,0,0.05); }
        .date-row { display: flex; align-items: baseline; gap: 3px; height: 18px; pointer-events: none; }
        .s { font-size: 14px; color: #2d3748; font-weight: bold; }
        .l { font-size: 10px; color: #4a5568; transform: scale(0.9); transform-origin: left; }
        
        #event-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; display: grid; grid-template-columns: repeat(7, 1fr); grid-auto-rows: 90px; }
        /* 核心修复：日历条必须允许内容撑开字体 */
        .event-bar { position: relative; padding: 2px 4px; border-radius: 4px; margin: 22px 2px 0 2px; z-index: 10; pointer-events: auto; cursor: pointer; display: flex !important; flex-direction: column; overflow: hidden; box-sizing: border-box; line-height: 1.2; word-break: break-all; }
        
        .footer-copy { width: 100%; text-align: center; font-size: 10px; color: #718096; margin-top: 15px; padding-bottom: 5px; cursor: pointer; }
        
        #yearView { display: none; padding: 5px; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 100%; box-sizing: border-box; }
        .year-month-card { border: 1px solid rgba(0,0,0,0.08); border-radius: 8px; padding: 8px; cursor: pointer; background: rgba(255,255,255,0.3); }
        .ym-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px; margin-top: 4px; }
        .ym-day { font-size: 8px; text-align: center; height: 12px; position: relative; }
        .dot-mark { width: 2px; height: 2px; background: #4fd1c5; border-radius: 50%; position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); }

        #modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 999; display: none; }
        #editor-modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 15px; border-radius: 12px; z-index: 1000; width: 92%; max-width: 440px; box-shadow: 0 10px 40px rgba(0,0,0,0.3); }
        .tool-group { display: flex; align-items: center; gap: 4px; margin-bottom: 8px; flex-wrap: wrap; }
        .tool-btn { background: #f1f5f9; border: 1px solid #cbd5e0; min-width: 34px; height: 30px; border-radius: 6px; cursor: pointer; font-size: 12px; display: flex; align-items: center; justify-content: center; }
        .dot { width: 18px; height: 18px; border-radius: 50%; border: 1px solid rgba(0,0,0,0.1); cursor: pointer; }
        #editor-field { width: 100%; min-height: 140px; max-height: 250px; border: 1px solid #cbd5e0; border-radius: 8px; padding: 10px; margin: 10px 0; font-size: 14px; outline: none; overflow-y: auto; background: #fff; display: flex; flex-direction: column; }
        .save-btn { background: #4fd1c5; color: white; border: none; padding: 10px 30px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .selected { border: 2.5px solid #3182ce !important; }
    </style>
</head>
<body>
    <div id="bg-layer"></div>
    <div id="modal-overlay" onclick="closeModal()"></div>
    
    <div id="editor-modal">
        <div style="font-size:12px; margin-bottom:8px; color:#4a5568;">
            📅 范围: <select id="startDaySelect"></select> — <select id="endDaySelect"></select> 日
        </div>
        <div class="tool-group">
            <button class="tool-btn" onmousedown="event.preventDefault(); exec('bold')">B</button>
            <button class="tool-btn" onmousedown="event.preventDefault(); exec('italic')">I</button>
            <button class="tool-btn" onmousedown="event.preventDefault(); exec('underline')">U</button>
            <div style="width:1px;height:16px;background:#ddd;margin:0 4px"></div>
            <div class="dot" style="background:#000" onmousedown="event.preventDefault(); exec('foreColor','#000')"></div>
            <div class="dot" style="background:#e53e3e" onmousedown="event.preventDefault(); exec('foreColor','#e53e3e')"></div>
            <div class="dot" style="background:#3182ce" onmousedown="event.preventDefault(); exec('foreColor','#3182ce')"></div>
        </div>
        <div class="tool-group">
            <button class="tool-btn" onmousedown="event.preventDefault(); applySize('13px')">小</button>
            <button class="tool-btn" onmousedown="event.preventDefault(); applySize('18px')">中</button>
            <button class="tool-btn" onmousedown="event.preventDefault(); applySize('26px')">大</button>
            <button class="tool-btn" onmousedown="event.preventDefault(); applySize('40px')">巨</button>
            <div style="width:1px;height:16px;background:#ddd;margin:0 4px"></div>
            <button class="tool-btn" onmousedown="event.preventDefault(); applyAlign('flex-start','left')">←</button>
            <button class="tool-btn" onmousedown="event.preventDefault(); applyAlign('center','center')">↔</button>
            <button class="tool-btn" onmousedown="event.preventDefault(); applyAlign('flex-end','right')">→</button>
            <button class="tool-btn" onmousedown="event.preventDefault(); applyAlign('flex-start')">↑</button>
            <button class="tool-btn" onmousedown="event.preventDefault(); applyAlign('center')">↕</button>
            <button class="tool-btn" onmousedown="event.preventDefault(); applyAlign('flex-end')">↓</button>
        </div>
        <div class="tool-group">
            <div class="dot" style="background:#FFD1DC" onclick="setBarColor('#FFD1DC')"></div>
            <div class="dot" style="background:#B2F2BB" onclick="setBarColor('#B2F2BB')"></div>
            <div class="dot" style="background:#A5D8FF" onclick="setBarColor('#A5D8FF')"></div>
            <div class="dot" style="background:#FFF3BF" onclick="setBarColor('#FFF3BF')"></div>
            <div class="dot" style="background:#f1f5f9;border:1px solid #ccc" onclick="setBarColor('#f1f5f9')"></div>
        </div>
        <div id="editor-field" contenteditable="true"></div>
        <div style="display:flex; justify-content: space-between; align-items: center;">
            <button style="color:#e53e3e;background:none;border:none;font-size:12px;cursor:pointer;" onclick="deleteEvent()">删除</button>
            <button class="save-btn" onclick="saveEvent()">保存修改</button>
        </div>
        <div style="margin-top:15px;"><input type="range" id="blurRange" min="0" max="30" value="4" style="width:100%" oninput="updateBlur(this.value)"></div>
    </div>

    <div class="calendar-box" id="mainBox">
        <div class="header">
            <button class="btn" onclick="changeMonth(-1)">‹</button>
            <div id="monthDisplay" class="title" onclick="toggleView()">加载中...</div>
            <button class="btn" onclick="changeMonth(1)">›</button>
        </div>
        <div id="monthView">
            <div class="week-header"><div>日</div><div>一</div><div>二</div><div>三</div><div>四</div><div>五</div><div>六</div></div>
            <div style="position:relative">
                <div id="dateGrid" class="date-grid"></div>
                <div id="event-layer"></div>
            </div>
        </div>
        <div id="yearView"></div>
        <div class="footer-copy" id="unlockTrigger">© 2026 🤿宇宙级潜水员🐟</div>
    </div>

    <script>
        const S_URL = "https://cnbarxcyhtuyympqwspb.supabase.co";
        const S_KEY = "sb_publishable_8lKRoBeyMpq8UEYugqvn7g_3_iImIur";
        const _db = supabase.createClient(S_URL, S_KEY);

        let currentDate = new Date(), viewMode = 'month', selection = [], currentBarColor = '#B2F2BB', editingId = null, events = [];
        let isAdmin = localStorage.getItem('is_admin') === 'true';

        async function syncData() {
            const { data } = await _db.from('events').select('*');
            events = data || [];
            renderCalendar();
            if(viewMode === 'year') renderYear();
        }

        function getLunarDay(date) {
            const lunarNames = ["初一","初二","初三","初四","初五","初六","初七","初八","初九","初十","十一","十二","十三","十四","十五","十六","十七","十八","十九","二十","廿一","廿二","廿三","廿四","廿五","廿六","廿七","廿八","廿九","三十"];
            try {
                const parts = new Intl.DateTimeFormat('zh-u-ca-chinese', {day:'numeric'}).formatToParts(date);
                const num = parseInt(parts.find(p => p.type === 'day').value);
                return lunarNames[num - 1];
            } catch(e) { return ""; }
        }

        function exec(cmd, val=null) { document.getElementById('editor-field').focus(); document.execCommand(cmd, false, val); }
        
        // 改进的字号应用：直接修改编辑框样式，这样即便不选文字也能存下整体字号
        function applySize(s) { 
            const f = document.getElementById('editor-field');
            const sel = window.getSelection();
            if (sel.rangeCount && sel.toString()) {
                document.execCommand('fontSize', false, '7'); // 占位
                const spans = f.querySelectorAll('font[size="7"]');
                spans.forEach(span => { span.removeAttribute('size'); span.style.fontSize = s; span.style.lineHeight="1.1"; });
            } else {
                f.style.fontSize = s;
            }
        }

        function applyAlign(v, h) { 
            const f = document.getElementById('editor-field');
            if(v) f.style.alignItems = v; if(h) f.style.textAlign = h;
        }

        function renderCalendar() {
            updateDisplayBg();
            const grid = document.getElementById('dateGrid'), layer = document.getElementById('event-layer');
            grid.innerHTML = ''; layer.innerHTML = '';
            const y = currentDate.getFullYear(), m = currentDate.getMonth();
            document.getElementById('monthDisplay').innerText = (viewMode === 'month') ? `${y}年 ${m+1}月` : `${y}年 全览`;
            
            const first = new Date(y, m, 1).getDay(), dInM = new Date(y, m + 1, 0).getDate();
            for (let i = 0; i < first; i++) grid.innerHTML += '<div class="empty-cell"></div>';
            
            let dateMap = {};
            for (let d = 1; d <= dInM; d++) {
                grid.innerHTML += `<div class="cell" onclick="handleCellClick(${d})" id="cell-${d}"><div class="date-row"><span class="s">${d}</span><span class="l">${getLunarDay(new Date(y,m,d))}</span></div></div>`;
                dateMap[d] = { row: Math.floor((first+d-1)/7)+1, col: ((first+d-1)%7)+1 };
            }
            for (let i = 0; i < (7-((first+dInM)%7))%7; i++) grid.innerHTML += '<div class="empty-cell"></div>';

            events.filter(ev => ev.year === y && ev.month === m).forEach(ev => {
                if(!dateMap[ev.start] || !dateMap[ev.end]) return;
                for(let r = dateMap[ev.start].row; r <= dateMap[ev.end].row; r++){
                    const sC = (r === dateMap[ev.start].row) ? dateMap[ev.start].col : 1;
                    const eC = (r === dateMap[ev.end].row) ? dateMap[ev.end].col : 7;
                    const bar = document.createElement('div'); bar.className = 'event-bar';
                    bar.style.gridColumn = `${sC}/${eC+1}`; bar.style.gridRow = r;
                    bar.style.backgroundColor = ev.barColor;
                    bar.style.textAlign = ev.textAlign || 'left';
                    bar.style.alignItems = ev.alignItems || 'flex-start';
                    // 核心：将存储的字号样式强制带入显示
                    bar.style.fontSize = ev.fontSize || '13px';
                    if(r === dateMap[ev.start].row) bar.innerHTML = ev.text;
                    bar.onclick = (e) => { e.stopPropagation(); openEditModal(ev.id); };
                    layer.appendChild(bar);
                }
            });
        }

        async function saveEvent() {
            const f = document.getElementById('editor-field');
            // 修复点：立即抓取当前下拉框的值，防止异步丢失
            const sVal = parseInt(document.getElementById('startDaySelect').value);
            const eVal = parseInt(document.getElementById('endDaySelect').value);
            
            const data = {
                text: f.innerHTML,
                start: sVal,
                end: eVal,
                year: currentDate.getFullYear(), month: currentDate.getMonth(),
                barColor: currentBarColor,
                textAlign: f.style.textAlign || 'left',
                alignItems: f.style.alignItems || 'flex-start',
                fontSize: f.style.fontSize || '13px' // 修复：保存外层字号
            };
            
            if(editingId) await _db.from('events').update(data).eq('id', editingId);
            else await _db.from('events').insert([{ id: Date.now(), ...data }]);
            
            closeModal();
            syncData();
        }

        function toggleView() {
            viewMode = (viewMode === 'month' ? 'year' : 'month');
            document.getElementById('monthView').style.display = (viewMode === 'month' ? 'block' : 'none');
            document.getElementById('yearView').style.display = (viewMode === 'year' ? 'grid' : 'none');
            renderCalendar();
            if(viewMode === 'year') renderYear();
        }

        function renderYear() {
            const yv = document.getElementById('yearView'); yv.innerHTML = '';
            const y = currentDate.getFullYear();
            for(let m=0; m<12; m++) {
                const card = document.createElement('div'); card.className = 'year-month-card';
                card.onclick = () => { currentDate.setMonth(m); toggleView(); };
                let h = `<div style="font-size:10px;font-weight:bold">${m+1}月</div><div class="ym-grid">`;
                const first = new Date(y, m, 1).getDay(), dInM = new Date(y, m+1, 0).getDate();
                for(let i=0; i<first; i++) h += '<div class="ym-day"></div>';
                for(let d=1; d<=dInM; d++) {
                    const has = events.some(ev => ev.year === y && ev.month === m && d >= ev.start && d <= ev.end);
                    h += `<div class="ym-day">${d}${has?'<div class="dot-mark"></div>':''}</div>`;
                }
                card.innerHTML = h + '</div>'; yv.appendChild(card);
            }
        }

        function updateBlur(v){ 
            const box = document.getElementById('mainBox');
            box.style.backdropFilter = `blur(${v}px)`; box.style.webkitBackdropFilter = `blur(${v}px)`;
            box.style.background = `rgba(255, 255, 255, ${0.6 + (v/100)})`;
            localStorage.setItem('my_calendar_blur', v); 
        }

        function handleCellClick(d) {
            if(!isAdmin) return;
            if (selection.length === 0) { selection.push(d); document.getElementById(`cell-${d}`).classList.add('selected'); }
            else { openEditModal(null, Math.min(selection[0], d), Math.max(selection[0], d)); }
        }

        function openEditModal(id, s, e) {
            editingId = id; const f = document.getElementById('editor-field');
            if(id) {
                const ev = events.find(i => i.id == id);
                initDP(ev.start, ev.end);
                f.innerHTML = ev.text; f.style.textAlign = ev.textAlign; f.style.alignItems = ev.alignItems;
                f.style.fontSize = ev.fontSize || '14px';
                currentBarColor = ev.barColor;
            } else { 
                initDP(s, e);
                f.innerHTML = ''; f.style.textAlign='left'; f.style.alignItems='flex-start'; f.style.fontSize='14px'; currentBarColor='#B2F2BB'; 
            }
            document.getElementById('modal-overlay').style.display = 'block';
            document.getElementById('editor-modal').style.display = 'block';
        }

        function setBarColor(c) { currentBarColor = c; }
        function initDP(s, e) {
            const sS = document.getElementById('startDaySelect'), eS = document.getElementById('endDaySelect');
            sS.innerHTML = eS.innerHTML = '';
            for(let i=1; i<=31; i++){ sS.innerHTML+=`<option value="${i}">${i}</option>`; eS.innerHTML+=`<option value="${i}">${i}</option>`; }
            sS.value = s || 1; eS.value = e || 1;
        }
        function closeModal() { document.getElementById('modal-overlay').style.display = 'none'; document.getElementById('editor-modal').style.display = 'none'; selection = []; document.querySelectorAll('.cell').forEach(c => c.classList.remove('selected')); editingId = null; }
        function changeMonth(o) { currentDate.setMonth(currentDate.getMonth()+o); syncData(); }
        function updateDisplayBg() { 
            const s = localStorage.getItem(`bg_${currentDate.getFullYear()}_${currentDate.getMonth()}`);
            if(s) document.getElementById('bg-layer').style.backgroundImage=`url(${s})`;
            else document.getElementById('bg-layer').style.backgroundImage='none';
            updateBlur(localStorage.getItem('my_calendar_blur') || 4);
        }
        async function deleteEvent() { if(confirm("确定删除？")) { await _db.from('events').delete().eq('id', editingId); closeModal(); syncData(); } }

        let uc = 0; document.getElementById('unlockTrigger').onclick = () => { if(++uc>=5){ if(prompt("验证码")==="2026"){ isAdmin=true; localStorage.setItem('is_admin','true'); alert("已解锁"); } uc=0; } };
        syncData();
    </script>
</body>
</html>
