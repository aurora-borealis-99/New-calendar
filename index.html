<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        #bg-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: #fdf6e3; background-size: cover; background-position: center; z-index: -1; transition: 0.5s; }
        body { margin: 0; padding: 20px 8px; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: "PingFang SC", "Microsoft YaHei", sans-serif; box-sizing: border-box; }
        
        /* 关键：增加 backdrop-filter 实现毛玻璃 */
        .calendar-box { 
            background: rgba(255, 255, 255, 0.9); 
            backdrop-filter: blur(4px); 
            -webkit-backdrop-filter: blur(4px);
            width: calc(100vw - 16px); 
            max-width: 1000px; 
            padding: 12px 8px; 
            border-radius: 12px; 
            box-shadow: 0 5px 20px rgba(0,0,0,0.05); 
            position: relative; 
            box-sizing: border-box; 
            overflow: hidden; 
            display: flex; 
            flex-direction: column; 
        }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; padding: 0 15px; }
        .title { font-size: 16px; color: #4a5568; font-weight: bold; cursor: pointer; border-bottom: 1px dashed #cbd5e0; }
        .btn { cursor: pointer; border: none; background: #f0f2f5; width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .week-header { display: grid; grid-template-columns: repeat(7, 1fr); text-align: center; color: #a0aec0; font-size: 10px; margin-bottom: 5px; }
        .date-grid { display: grid; grid-template-columns: repeat(7, 1fr); grid-auto-rows: 90px; border: 1px solid #eee; width: 100%; }
        .cell, .empty-cell { background: transparent; padding: 2px; border-right: 1px solid rgba(238,238,238,0.5); border-bottom: 1px solid rgba(238,238,238,0.5); box-sizing: border-box; }
        .cell { cursor: pointer; position: relative; }
        .date-row { display: flex; align-items: baseline; gap: 3px; height: 18px; pointer-events: none; }
        .s { font-size: 14px; color: #2d3748; font-weight: bold; }
        .l { font-size: 9px; color: #718096; transform: scale(0.85); transform-origin: left; }
        
        #event-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; display: grid; grid-template-columns: repeat(7, 1fr); grid-auto-rows: 90px; }
        .event-bar { position: relative; font-size: 11px; padding: 4px; border-radius: 4px; margin: 22px 2px 0 2px; z-index: 10; pointer-events: auto; cursor: pointer; display: flex !important; flex-direction: column; overflow: hidden; box-sizing: border-box; line-height: 1.1; }
        
        #yearView { display: none; padding: 5px; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 100%; box-sizing: border-box; }
        .year-month-card { border: 1px solid rgba(0,0,0,0.05); border-radius: 8px; padding: 8px; cursor: pointer; background: rgba(255,255,255,0.4); box-sizing: border-box; }
        .ym-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px; margin-top: 4px; }
        .ym-day { font-size: 8px; text-align: center; color: #a0aec0; height: 12px; display: flex; align-items: center; justify-content: center; position: relative; }
        .dot-mark { width: 2.5px; height: 2.5px; background: #4fd1c5; border-radius: 50%; position: absolute; bottom: -1px; left: 50%; transform: translateX(-50%); }

        .footer-copy { text-align: center; font-size: 10px; color: #a0aec0; margin-top: 15px; padding-bottom: 5px; cursor: pointer; }
        
        /* 巨无霸编辑盘样式 */
        #modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.3); z-index: 999; display: none; }
        #editor-modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 12px; border-radius: 12px; z-index: 1000; width: 92%; max-width: 420px; box-sizing: border-box; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        .tool-group { display: flex; align-items: center; gap: 3px; margin-bottom: 8px; flex-wrap: nowrap; overflow-x: auto; padding-bottom: 2px; }
        .tool-btn { background: #f8fafc; border: 1px solid #e2e8f0; min-width: 32px; height: 28px; border-radius: 4px; cursor: pointer; font-size: 11px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .dot { width: 16px; height: 16px; border-radius: 50%; border: 1px solid rgba(0,0,0,0.1); cursor: pointer; flex-shrink: 0; }
        #editor-field { width: 100%; min-height: 120px; max-height: 250px; border: 1px solid #e2e8f0; border-radius: 8px; padding: 10px; margin: 8px 0; font-size: 14px; outline: none; display: flex; flex-direction: column; overflow-y: auto; background: #fff; }
        .save-btn { background: #4fd1c5; color: white; border: none; padding: 8px 24px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .selected { background-color: #ebf8ff !important; border: 2px solid #4299e1 !important; }
        .blur-slider-box { display: flex; align-items: center; gap: 8px; font-size: 10px; color: #94a3b8; margin-top: 10px; border-top: 1px dashed #eee; padding-top: 10px; }
    </style>
</head>
<body id="body-tag">
    <div id="bg-layer"></div>
    <div id="modal-overlay" onclick="closeModal()"></div>
    
    <div id="editor-modal">
        <div style="font-size:12px;margin-bottom:8px;background:#f1f5f9;padding:6px;border-radius:6px;color:#475569;">
            📅 范围: <select id="startDaySelect"></select> — <select id="endDaySelect"></select> 日
        </div>
        <div class="tool-group">
            <button class="tool-btn" onmousedown="exec(event,'bold')"><b>B</b></button>
            <button class="tool-btn" onmousedown="exec(event,'italic')"><i>I</i></button>
            <button class="tool-btn" onmousedown="exec(event,'underline')"><u>U</u></button>
            <div style="width:1px;height:14px;background:#ddd;margin:0 4px"></div>
            <div class="dot" style="background:#e53e3e" onmousedown="execColor(event,'#e53e3e')"></div>
            <div class="dot" style="background:#3182ce" onmousedown="execColor(event,'#3182ce')"></div>
            <div class="dot" style="background:#38a169" onmousedown="execColor(event,'#38a169')"></div>
            <div class="dot" style="background:#000" onmousedown="execColor(event,'#000')"></div>
            <div class="dot" style="background:#ed8936" onmousedown="execColor(event,'#ed8936')"></div>
        </div>
        <div class="tool-group">
            <button class="tool-btn" onmousedown="setStyle(event,'fontSize','13px')">小</button>
            <button class="tool-btn" onmousedown="setStyle(event,'fontSize','18px')">中</button>
            <button class="tool-btn" onmousedown="setStyle(event,'fontSize','26px')">大</button>
            <button class="tool-btn" onmousedown="setStyle(event,'fontSize','42px')">巨</button>
            <div style="width:1px;height:14px;background:#ddd;margin:0 4px"></div>
            <button class="tool-btn" onmousedown="exec(event,'justifyLeft')">←</button>
            <button class="tool-btn" onmousedown="exec(event,'justifyCenter')">↔</button>
            <button class="tool-btn" onmousedown="exec(event,'justifyRight')">→</button>
            <div style="width:1px;height:14px;background:#ddd;margin:0 4px"></div>
            <button class="tool-btn" onmousedown="setAlign(event,'flex-start')">↑</button>
            <button class="tool-btn" onmousedown="setAlign(event,'center')">↕</button>
            <button class="tool-btn" onmousedown="setAlign(event,'flex-end')">↓</button>
        </div>
        <div class="tool-group">
            <span style="font-size:10px;color:#94a3b8">底色:</span>
            <div class="dot" style="background:#FFD1DC" onclick="setBarColor('#FFD1DC')"></div>
            <div class="dot" style="background:#B2F2BB" onclick="setBarColor('#B2F2BB')"></div>
            <div class="dot" style="background:#A5D8FF" onclick="setBarColor('#A5D8FF')"></div>
            <div class="dot" style="background:#FFF3BF" onclick="setBarColor('#FFF3BF')"></div>
            <div class="dot" style="background:#E5DBFF" onclick="setBarColor('#E5DBFF')"></div>
            <div class="dot" style="background:#f1f5f9;border:1px solid #ccc" onclick="setBarColor('#f1f5f9')"></div>
        </div>
        <div id="editor-field" contenteditable="true"></div>
        <div style="display:flex; justify-content: space-between; align-items: center; border-top: 1px solid #eee; padding-top: 10px;">
            <div>
                <button id="deleteBtn" style="color:#e53e3e;background:none;border:none;font-size:11px;cursor:pointer;margin-right:8px" onclick="deleteEvent()">删除</button>
                <button class="tool-btn" style="display:inline-block;padding:0 8px;width:auto;" onclick="changeBg()">背景</button>
            </div>
            <button class="save-btn" onclick="saveEvent()">保存</button>
        </div>
        <div class="blur-slider-box">
            <span>清晰</span>
            <input type="range" id="blurRange" min="0" max="25" value="4" oninput="updateBlur(this.value)">
            <span>模糊</span>
        </div>
        <div style="margin-top:12px; display:flex; gap:8px;">
            <button class="tool-btn" style="flex:1;background:#f8fafc;color:#64748b" onclick="exportData()">备份 (JSON)</button>
            <button class="tool-btn" style="flex:1;background:#f8fafc;color:#64748b" onclick="importData()">还原 (JSON)</button>
        </div>
    </div>

    <div class="calendar-box" id="mainBox">
        <div class="header">
            <button class="btn" onclick="changeMonth(-1)">‹</button>
            <div id="monthDisplay" class="title" onclick="toggleView()"></div>
            <button class="btn" onclick="changeMonth(1)">›</button>
        </div>
        <div id="monthView">
            <div class="week-header"><div>日</div><div>一</div><div>二</div><div>三</div><div>四</div><div>五</div><div>六</div></div>
            <div style="position:relative">
                <div id="dateGrid" class="date-grid"></div>
                <div id="event-layer"></div>
            </div>
        </div>
        <div id="yearView"></div>
        <div class="footer-copy" id="unlockTrigger">© 2026 🤿宇宙级潜水员🐟</div>
    </div>

    <script>
        const S_URL = "https://cnbarxcyhtuyympqwspb.supabase.co";
        const S_KEY = "sb_publishable_8lKRoBeyMpq8UEYugqvn7g_3_iImIur";
        const _db = supabase.createClient(S_URL, S_KEY);

        let currentDate = new Date(), viewMode = 'month', selection = [], currentBarColor = '#B2F2BB', editingId = null, events = [];
        let isAdmin = localStorage.getItem('is_admin') === 'true';

        async function syncData() {
            const { data } = await _db.from('events').select('*');
            events = data || [];
            renderCalendar();
            if(viewMode === 'year') renderYear();
        }

        // 彻底修复农历显示：强制转换数字为中文
        function getLunarDay(date) {
            const lunarNames = ["初一","初二","初三","初四","初五","初六","初七","初八","初九","初十","十一","十二","十三","十四","十五","十六","十七","十八","十九","二十","廿一","廿二","廿三","廿四","廿五","廿六","廿vii","廿八","廿九","三十"];
            try {
                const parts = new Intl.DateTimeFormat('zh-u-ca-chinese', {day:'numeric'}).formatToParts(date);
                const val = parts.find(p => p.type === 'day').value;
                // 如果返回的是数字(如 "1"), 则从数组取。如果是中文则保留。
                const num = parseInt(val);
                return isNaN(num) ? val.replace('日','') : lunarNames[num - 1];
            } catch(e) { return "初一"; }
        }

        function renderCalendar() {
            updateDisplayBg();
            const grid = document.getElementById('dateGrid'), layer = document.getElementById('event-layer');
            grid.innerHTML = ''; layer.innerHTML = '';
            const y = currentDate.getFullYear(), m = currentDate.getMonth();
            document.getElementById('monthDisplay').innerText = (viewMode === 'month') ? `${y}年 ${m+1}月` : `${y}年 全览`;
            
            const first = new Date(y, m, 1).getDay(), dInM = new Date(y, m + 1, 0).getDate();
            for (let i = 0; i < first; i++) grid.innerHTML += '<div class="empty-cell"></div>';
            
            let dateMap = {};
            for (let d = 1; d <= dInM; d++) {
                const dateObj = new Date(y, m, d);
                grid.innerHTML += `<div class="cell" onclick="handleCellClick(${d})" id="cell-${d}"><div class="date-row"><span class="s">${d}</span><span class="l">${getLunarDay(dateObj)}</span></div></div>`;
                dateMap[d] = { row: Math.floor((first+d-1)/7)+1, col: ((first+d-1)%7)+1 };
            }
            const remain = (7 - ((first + dInM) % 7)) % 7;
            for (let i = 0; i < remain; i++) grid.innerHTML += '<div class="empty-cell"></div>';

            events.filter(ev => ev.year === y && ev.month === m).forEach(ev => {
                if(!dateMap[ev.start] || !dateMap[ev.end]) return;
                for(let r = dateMap[ev.start].row; r <= dateMap[ev.end].row; r++){
                    const sC = (r === dateMap[ev.start].row) ? dateMap[ev.start].col : 1;
                    const eC = (r === dateMap[ev.end].row) ? dateMap[ev.end].col : 7;
                    const bar = document.createElement('div'); bar.className = 'event-bar';
                    bar.style.gridColumn = `${sC}/${eC+1}`; bar.style.gridRow = r;
                    bar.style.backgroundColor = ev.barColor;
                    bar.style.textAlign = ev.textAlign || 'left';
                    bar.style.alignItems = ev.alignItems || 'flex-start';
                    if(r === dateMap[ev.start].row) bar.innerHTML = ev.text;
                    bar.onclick = (e) => { e.stopPropagation(); openEditModal(ev.id); };
                    layer.appendChild(bar);
                }
            });
        }

        async function saveEvent() {
            if(!isAdmin) return alert("请先解锁");
            const f = document.getElementById('editor-field');
            const data = {
                text: f.innerHTML,
                start: parseInt(document.getElementById('startDaySelect').value),
                end: parseInt(document.getElementById('endDaySelect').value),
                year: currentDate.getFullYear(), month: currentDate.getMonth(),
                barColor: currentBarColor,
                textAlign: f.style.textAlign || 'left',
                alignItems: f.style.alignItems || 'flex-start'
            };
            if(editingId) await _db.from('events').update(data).eq('id', editingId);
            else await _db.from('events').insert([{ id: Date.now(), ...data }]);
            closeModal(); syncData();
        }

        function renderYear() {
            const yv = document.getElementById('yearView'); yv.innerHTML = '';
            const y = currentDate.getFullYear();
            yv.style.display = 'grid'; // 确保显示
            for(let m=0; m<12; m++) {
                const card = document.createElement('div'); card.className = 'year-month-card';
                card.onclick = () => { currentDate.setMonth(m); toggleView(); };
                let h = `<div style="font-size:11px;font-weight:bold">${m+1}月</div><div class="ym-grid">`;
                const first = new Date(y, m, 1).getDay(), dInM = new Date(y, m+1, 0).getDate();
                for(let i=0; i<first; i++) h += '<div class="ym-day"></div>';
                for(let d=1; d<=dInM; d++) {
                    const has = events.some(ev => ev.year === y && ev.month === m && d >= ev.start && d <= ev.end);
                    h += `<div class="ym-day">${d}${has?'<div class="dot-mark"></div>':''}</div>`;
                }
                card.innerHTML = h + '</div>'; yv.appendChild(card);
            }
        }

        function toggleView() {
            viewMode = (viewMode === 'month' ? 'year' : 'month');
            document.getElementById('monthView').style.display = (viewMode === 'month' ? 'block' : 'none');
            document.getElementById('yearView').style.display = (viewMode === 'year' ? 'grid' : 'none');
            if(viewMode === 'year') renderYear(); else renderCalendar();
        }

        function updateBlur(v){ 
            const val = `blur(${v}px)`;
            document.getElementById('mainBox').style.backdropFilter = val;
            document.getElementById('mainBox').style.webkitBackdropFilter = val;
            localStorage.setItem('my_calendar_blur', v); 
        }

        function changeBg(){ 
            const i=document.createElement("input"); i.type="file"; 
            i.onchange=e=>{ 
                const r=new FileReader(); r.onload=ev=>{ 
                    const img = new Image(); img.src = ev.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas'); const ctx = canvas.getContext('2d');
                        canvas.width = 1200; canvas.height = img.height * (1200 / img.width);
                        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                        localStorage.setItem(`bg_${currentDate.getFullYear()}_${currentDate.getMonth()}`, canvas.toDataURL('image/jpeg', 0.6)); 
                        updateDisplayBg(); 
                    };
                }; r.readAsDataURL(e.target.files[0]); 
            }; i.click(); 
        }

        function exportData() {
            const blob = new Blob([JSON.stringify(events)], {type: 'application/json'});
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `calendar_backup_${Date.now()}.json`; a.click();
        }

        function importData() {
            const input = document.createElement('input'); input.type = 'file';
            input.onchange = e => {
                const reader = new FileReader();
                reader.onload = async event => {
                    const imported = JSON.parse(event.target.result);
                    await _db.from('events').insert(imported);
                    syncData(); alert("导入成功！");
                };
                reader.readAsText(e.target.files[0]);
            }; input.click();
        }

        // 基础功能
        let unlockClicks = 0;
        document.getElementById('unlockTrigger').addEventListener('click', () => {
            if(++unlockClicks >= 5) {
                if(prompt("验证暗号") === "2026") { isAdmin=true; localStorage.setItem('is_admin','true'); alert("开启编辑模式"); }
                unlockClicks = 0;
            }
        });

        function handleCellClick(d) {
            if(!isAdmin) return;
            if (selection.length === 0) { selection.push(d); document.getElementById(`cell-${d}`).classList.add('selected'); }
            else { openEditModal(null, Math.min(selection[0], d), Math.max(selection[0], d)); }
        }

        function openEditModal(id, s, e) {
            editingId = id; const f = document.getElementById('editor-field');
            initDP(s, e);
            if(id) {
                const ev = events.find(i => i.id === id);
                f.innerHTML = ev.text; f.style.textAlign = ev.textAlign; f.style.alignItems = ev.alignItems;
                currentBarColor = ev.barColor;
            } else { f.innerHTML = ''; currentBarColor = '#B2F2BB'; f.style.textAlign = 'left'; f.style.alignItems = 'flex-start'; }
            document.getElementById('modal-overlay').style.display = 'block';
            document.getElementById('editor-modal').style.display = 'block';
        }

        function exec(e, c) { e.preventDefault(); document.execCommand(c, false, null); }
        function execColor(e, v) { e.preventDefault(); document.execCommand('foreColor', false, v); }
        function setStyle(e, p, v) { e.preventDefault(); const s = document.createElement('span'); s.style[p] = v; s.style.lineHeight = "1.1"; window.getSelection().getRangeAt(0).wrapAll(s); }
        function setAlign(e, v) { e.preventDefault(); const f = document.getElementById('editor-field'); f.style.alignItems = v; if(v==='flex-start') f.style.textAlign='left'; if(v==='center') f.style.textAlign='center'; if(v==='flex-end') f.style.textAlign='right'; }
        function setBarColor(c) { currentBarColor = c; }
        function initDP(s, e) {
            const sS = document.getElementById('startDaySelect'), eS = document.getElementById('endDaySelect');
            sS.innerHTML = eS.innerHTML = '';
            for(let i=1; i<=31; i++){ sS.innerHTML+=`<option value="${i}">${i}</option>`; eS.innerHTML+=`<option value="${i}">${i}</option>`; }
            sS.value = s; eS.value = e;
        }
        function closeModal() { document.getElementById('modal-overlay').style.display = 'none'; document.getElementById('editor-modal').style.display = 'none'; selection = []; document.querySelectorAll('.cell').forEach(c => c.classList.remove('selected')); }
        function changeMonth(o) { currentDate.setMonth(currentDate.getMonth()+o); syncData(); }
        function updateDisplayBg() { 
            const s = localStorage.getItem(`bg_${currentDate.getFullYear()}_${currentDate.getMonth()}`);
            if(s){ document.getElementById('bg-layer').style.backgroundImage=`url(${s})`; document.body.classList.add('has-bg'); }
            else { document.getElementById('bg-layer').style.backgroundImage='none'; document.body.classList.remove('has-bg'); }
            updateBlur(localStorage.getItem('my_calendar_blur') || 4);
        }
        async function deleteEvent() { if(confirm("确定删除？")) { await _db.from('events').delete().eq('id', editingId); closeModal(); syncData(); } }

        syncData();
    </script>
</body>
</html>
