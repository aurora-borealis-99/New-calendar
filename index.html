<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>我的全能云端日历</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/lunar-javascript/lunar.js"></script>
    
    <style>
        :root { --bg: #fff5f5; --primary: #feb2b2; --text: #4a5568; }
        body { 
            font-family: -apple-system, sans-serif; 
            background: var(--bg);
            background-image: url('https://images.unsplash.com/photo-1519750783826-e2420f4d687f?auto=format&fit=crop&w=1000&q=80');
            background-size: cover;
            background-attachment: fixed;
            margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; 
        }
        
        #calendar-container { 
            width: 90%; max-width: 400px; 
            background: rgba(255,255,255,0.85); 
            backdrop-filter: blur(10px); 
            border-radius: 25px; padding: 20px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        }

        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; position: relative; }
        
        /* 确保格子有高度，否则看不见 */
        .cell { 
            aspect-ratio: 1; border-radius: 8px; background: rgba(255,255,255,0.4);
            border: 1px solid rgba(0,0,0,0.05); display: flex; flex-direction: column;
            padding: 4px; font-size: 12px; cursor: pointer;
        }
        .empty-cell { aspect-ratio: 1; }
        
        .lunar-text { font-size: 8px; color: #a0aec0; margin-top: 2px; }

        .event-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: grid; grid-template-columns: repeat(7, 1fr); pointer-events: none; z-index: 10; }
        .event-bar { 
            pointer-events: auto; height: 16px; margin-top: 20px; font-size: 9px; 
            background: var(--primary); color: white; padding: 0 4px; border-radius: 4px; 
            display: flex; align-items: center; overflow: hidden;
        }

        #login-modal { 
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            background: white; padding: 20px; border-radius: 20px; z-index: 100; text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

<div id="calendar-container">
    <div class="header">
        <button onclick="changeMonth(-1)">←</button>
        <h3 id="monthDisplay" onclick="handleTitleClick()">加载中...</h3>
        <button onclick="changeMonth(1)">→</button>
    </div>
    <div style="position: relative;">
        <div class="grid" id="dateGrid"></div>
        <div class="event-layer" id="eventLayer"></div>
    </div>
    <div style="text-align:center; font-size:10px; color:#a0aec0; margin-top:15px;" id="statusLine">☁️ 正在连接云端...</div>
</div>

<div id="login-modal" id="loginModal">
    <input type="password" id="passInput" placeholder="暗号">
    <button onclick="checkPass()">登录</button>
</div>

<script>
    // 你的配置
    const S_URL = "https://cnbarxcyhtuyympqwspb.supabase.co";
    const S_KEY = "Sb_publishable_8lKRoBeyMpq8UEYugqvn7g_3_iImIur";
    let _db;

    let curr = new Date();
    let events = [];
    let isAdmin = false;
    let clickHeaderTimes = 0;

    // 初始化 Supabase
    function init() {
        try {
            _db = supabase.createClient(S_URL, S_KEY);
            loadData();
        } catch (e) {
            document.getElementById('statusLine').innerText = "❌ 库加载失败，请刷新";
        }
    }

    async function loadData() {
        const { data, error } = await _db.from('events').select('*');
        if (error) {
            console.error(error);
            document.getElementById('statusLine').innerText = "⚠️ 云端连接失败，请检查 RLS";
        } else {
            events = data.map(e => ({ id: e.id, date: e.event_date, text: e.content }));
            document.getElementById('statusLine').innerText = "☁️ 访客模式 (只读)";
            render();
        }
    }

    function render() {
        const grid = document.getElementById('dateGrid');
        const layer = document.getElementById('eventLayer');
        grid.innerHTML = ''; layer.innerHTML = '';
        
        const y = curr.getFullYear(), m = curr.getMonth();
        document.getElementById('monthDisplay').innerText = `${y}年${m+1}月`;
        
        const firstDay = new Date(y, m, 1).getDay();
        const daysInMonth = new Date(y, m + 1, 0).getDate();
        
        for (let i = 0; i < firstDay; i++) grid.innerHTML += '<div class="empty-cell"></div>';
        
        for (let d = 1; d <= daysInMonth; d++) {
            // 农历计算
            let lunarTxt = "";
            try {
                const dateObj = new Date(y, m, d);
                lunarTxt = Solar.fromDate(dateObj).getLunar().getDayInChinese();
            } catch(e) { lunarTxt = ""; }

            grid.innerHTML += `
                <div class="cell" onclick="addEvent(${d})">
                    <span>${d}</span>
                    <span class="lunar-text">${lunarTxt}</span>
                </div>`;
            
            const dateStr = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
            const dayEvents = events.filter(e => e.date === dateStr);
            dayEvents.forEach(e => {
                const bar = document.createElement('div');
                bar.className = 'event-bar';
                const pos = firstDay + d - 1;
                bar.style.gridColumn = (pos % 7) + 1;
                bar.style.gridRow = Math.floor(pos / 7) + 1;
                bar.innerText = e.text;
                bar.onclick = (ev) => { ev.stopPropagation(); deleteEvent(e.id); };
                layer.appendChild(bar);
            });
        }
        
        // 补全末尾
        const totalCells = firstDay + daysInMonth;
        const remaining = (7 - (totalCells % 7)) % 7;
        for (let i = 0; i < remaining; i++) grid.innerHTML += '<div class="empty-cell"></div>';
    }

    // 交互逻辑
    function handleTitleClick() {
        clickHeaderTimes++;
        if (clickHeaderTimes >= 5) {
            document.getElementById('login-modal').style.display = 'block';
            clickHeaderTimes = 0;
        }
    }

    function checkPass() {
        if (document.getElementById('passInput').value === "2026") {
            isAdmin = true;
            document.getElementById('statusLine').innerText = "✨ 管理员模式";
            document.getElementById('login-modal').style.display = 'none';
            alert("解锁成功！");
        } else { alert("暗号错误"); }
    }

    async function addEvent(d) {
        if (!isAdmin) return alert("请先验证身份");
        const txt = prompt("输入记录内容:");
        if (!txt) return;
        const dateStr = `${curr.getFullYear()}-${String(curr.getMonth()+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        await _db.from('events').insert([{ event_date: dateStr, content: txt, color: '#feb2b2' }]);
        loadData();
    }

    async function deleteEvent(id) {
        if (!isAdmin || !confirm("确定删除？")) return;
        await _db.from('events').delete().eq('id', id);
        loadData();
    }

    function changeMonth(s) {
        curr.setMonth(curr.getMonth() + s);
        render();
    }

    // 关键：确保库加载完再运行
    window.addEventListener('load', init);
</script>
</body>
</html>
